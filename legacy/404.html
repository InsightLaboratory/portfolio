<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1f2937 100%);
            color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            background: rgba(31, 41, 55, 0.6);
            padding: 3rem 2rem;
            border-radius: 12px;
            border: 1px solid #374151;
            max-width: 500px;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #3b82f6 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        p {
            font-size: 1.1rem;
            color: #d1d5db;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        a {
            display: inline-block;
            padding: 0.75rem 1.75rem;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Página no encontrada. La ruta que buscas no existe en el portafolio.</p>
        <a href="/">Volver al Inicio</a>
    </div>
    
    <script>
        // Redirect 404s to the index page with the route as a query parameter
        // This is for single-page app routing
        window.location.replace('/?path=' + encodeURIComponent(window.location.pathname));
    </script>
</body>
</html>
